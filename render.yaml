services:
  - type: web
    name: taskflow
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz.txt
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        sync: false
      - key: APP_KEY
        sync: false
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: file
      - key: CACHE_STORE
        value: file
      - key: QUEUE_CONNECTION
        value: sync
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: taskflow-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: taskflow-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: taskflow-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: taskflow-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: taskflow-db
          property: password

databases:
  - name: taskflow-db
    plan: free
